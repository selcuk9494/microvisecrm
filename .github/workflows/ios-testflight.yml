name: iOS TestFlight
on:
workflow_dispatch:
inputs:
webOrigin:
description: 'EXPO_PUBLIC_WEB_ORIGIN (leave empty to use repo variable/secret)'
required: false
push:
branches: [ main ]
paths:
- 'packages/mobile/**'
- '.github/workflows/ios-testflight.yml'
jobs:
build-and-submit:
runs-on: macos-latest
defaults:
run:
working-directory: packages/mobile
steps:
- name: Checkout
uses: actions/checkout@v4
- name: Setup Node
uses: actions/setup-node@v4
with:
node-version: 20
- name: Install EAS CLI
run: npm i -g eas-cli
- name: Install dependencies
run: npm ci
- name: Verify Expo login
run: npx --yes eas-cli whoami
env:
EXPO_TOKEN: [ o bj ec tO bj ec t ] secre t s . E A S T ​ O K EN − nam e : B u i l d an d A u t o − S u bmi tt o T es tFl i g h t e n v : EXP O T ​ O K EN : {{ secrets.EAS_TOKEN }}
EXPO_PUBLIC_WEB_ORIGIN: ${{ github.event.inputs.webOrigin || vars.EXPO_PUBLIC_WEB_ORIGIN || secrets.EXPO_PUBLIC_WEB_ORIGIN }}
run: |
eas build -p ios --profile production --non-interactive --auto-submit
