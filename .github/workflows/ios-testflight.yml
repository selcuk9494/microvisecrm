  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Install EAS CLI
    run: npm i -g eas-cli

  - name: Install dependencies (npm only)
    run: npm install --workspaces=false --no-audit --no-fund --legacy-peer-deps

  - name: Verify Expo login
    run: npx --yes eas-cli whoami
    env:
      EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}

  - name: Build and Auto-Submit to TestFlight
    env:
      EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}
      EXPO_PUBLIC_WEB_ORIGIN: ${{ github.event.inputs.webOrigin || vars.EXPO_PUBLIC_WEB_ORIGIN || secrets.EXPO_PUBLIC_WEB_ORIGIN }}
    run: |
      eas build -p ios --profile production --non-interactive --auto-submit
