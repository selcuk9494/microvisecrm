version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: istakip
      POSTGRES_PASSWORD: istakip
      POSTGRES_DB: istakip
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
volumes:
  db_data:
  redis_data:
